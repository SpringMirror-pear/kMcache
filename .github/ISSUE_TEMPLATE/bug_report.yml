name: Bug report
description: Report a reproducible defect in kmcache
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code, config, or steps to reproduce
      placeholder: |
        1. Configure cache with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, FastAPI version, Redis version, and kmcache version
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, metrics, stack traces, or anything else relevant
